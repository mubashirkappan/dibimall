name: Laravel Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            cd /home/u302678294/domains/fooddly.com/public_html/api

            git pull origin main

            composer install --no-interaction --prefer-dist --optimize-autoloader

            PHP_PATH=$(which php)

            $PHP_PATH artisan migrate --force

            $PHP_PATH artisan optimize:clear

            $PHP_PATH artisan optimize
